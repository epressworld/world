<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#1a1a1a"/>
      <stop offset="100%" stop-color="#0a0a0a"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <rect width="800" height="600" fill="url(#bgGrad)"/>
  
  <g stroke="#F7931A" stroke-width="1.5" opacity="0.3">
    <line x1="150" y1="200" x2="300" y2="150"/>
    <line x1="150" y1="200" x2="280" y2="350"/>
    <line x1="150" y1="200" x2="200" y2="450"/>
    <line x1="150" y1="200" x2="450" y2="180"/>
    <line x1="150" y1="200" x2="400" y2="400"/>
    
    <line x1="300" y1="150" x2="450" y2="180"/>
    <line x1="300" y1="150" x2="500" y2="280"/>
    <line x1="300" y1="150" x2="400" y2="400"/>
    <line x1="300" y1="150" x2="280" y2="350"/>
    
    <line x1="450" y1="180" x2="500" y2="280"/>
    <line x1="450" y1="180" x2="600" y2="200"/>
    <line x1="450" y1="180" x2="550" y2="400"/>
    <line x1="450" y1="180" x2="400" y2="400"/>
    
    <line x1="500" y1="280" x2="600" y2="200"/>
    <line x1="500" y1="280" x2="650" y2="350"/>
    <line x1="500" y1="280" x2="550" y2="400"/>
    <line x1="500" y1="280" x2="400" y2="400"/>
    <line x1="500" y1="280" x2="280" y2="350"/>
    
    <line x1="600" y1="200" x2="650" y2="350"/>
    <line x1="600" y1="200" x2="550" y2="400"/>
    
    <line x1="650" y1="350" x2="550" y2="400"/>
    <line x1="650" y1="350" x2="400" y2="400"/>
    
    <line x1="280" y1="350" x2="400" y2="400"/>
    <line x1="280" y1="350" x2="200" y2="450"/>
    
    <line x1="200" y1="450" x2="400" y2="400"/>
    <line x1="200" y1="450" x2="550" y2="400"/>
  </g>
  
  <g fill="#F7931A" filter="url(#glow)">
    <circle cx="150" cy="200" r="8"/>
    <circle cx="300" cy="150" r="10"/>
    <circle cx="450" cy="180" r="12"/>
    <circle cx="500" cy="280" r="8"/>
    <circle cx="600" cy="200" r="6"/>
    <circle cx="650" cy="350" r="10"/>
    <circle cx="280" cy="350" r="7"/>
    <circle cx="200" cy="450" r="8"/>
    <circle cx="400" cy="400" r="14"/>
    <circle cx="550" cy="400" r="9"/>
  </g>
  
  <g fill="#FFB84D" opacity="0.6">
    <circle cx="150" cy="200" r="3"/>
    <circle cx="300" cy="150" r="4"/>
    <circle cx="450" cy="180" r="5"/>
    <circle cx="500" cy="280" r="3"/>
    <circle cx="600" cy="200" r="2"/>
    <circle cx="650" cy="350" r="4"/>
    <circle cx="280" cy="350" r="3"/>
    <circle cx="200" cy="450" r="3"/>
    <circle cx="400" cy="400" r="6"/>
    <circle cx="550" cy="400" r="4"/>
